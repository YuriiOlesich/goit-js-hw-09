<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Завдання 2 - Форма зворотного зв'язку</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    .feedback-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-weight: bold;
    }
    input[type="email"],
    textarea {
      padding: 10px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 4px;
    }
    input:focus,
    textarea:focus {
      border-color: #4a90e2;
      outline: none;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      background-color: #4a90e2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #357abd;
    }
  </style>
</head>
<body>

  <form class="feedback-form" autocomplete="off">
    <label>
      Email
      <input type="email" name="email" autofocus />
    </label>
    <label>
      Message
      <textarea name="message" rows="8"></textarea>
    </label>
    <button type="submit">Submit</button>
  </form>

  <script src="./js/2-form.js"></script>
</body>
</html>
